<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pirated Lib</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Brass+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── TOP NAV ─────────────────────────────────────────── -->
  <nav id="nav">
    <span class="logo" onclick="gp('home')">
      Pirated Lib
      <span class="logo-tag">beta</span>
    </span>
    <div class="nav-div"></div>
    <div class="nav-ls">
      <button class="nb on" id="nb-home"        onclick="gp('home')">Home</button>
      <button class="nb"    id="nb-libraries"   onclick="gp('libraries')">Libraries</button>
      <button class="nb"    id="nb-collections" onclick="gp('collections')">Collections</button>
      <button class="nb"    id="nb-lists"       onclick="gp('lists')">Lists</button>
    </div>
    <div class="nav-sp"></div>
    <button class="nav-srch" onclick="document.getElementById('q').focus()">
      ⌕&nbsp; Search
    </button>
  </nav>

  <!-- ── SEARCH BAR ──────────────────────────────────────── -->
  <div id="sbar">
    <div class="sw">
      <span class="si">⌕</span>
      <input
        id="q"
        type="text"
        placeholder="Search libraries, collections, sites…"
        oninput="doSearch(this.value)"
      >
    </div>
  </div>

  <!-- ── MAIN LAYOUT ─────────────────────────────────────── -->
  <div id="app">
    <aside id="sb"></aside>
    <main  id="ct"></main>
  </div>

  <!-- ── SCRIPTS ─────────────────────────────────────────── -->
  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
